<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #eef8f8;
      --surface: #ffffff;
      --surface-soft: #f5fbfb;
      --text: #22324a;
      --muted: #66758d;
      --line: #dce8ea;
      --accent: #63cbc1;
      --accent-dark: #1ea99b;
      --accent-soft: #d8f4ef;
      --shadow: 0 16px 40px rgba(26, 59, 87, 0.08);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --max-width: 1240px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, #dff5f2 0%, rgba(223,245,242,0.45) 18%, transparent 35%),
        radial-gradient(circle at left center, #dff2fb 0%, rgba(223,242,251,0.42) 16%, transparent 32%),
        linear-gradient(180deg, #f6fbfb 0%, #eef8f8 100%);
      min-height: 100vh;
    }

    .page-shell {
      width: min(calc(100% - 40px), var(--max-width));
      margin: 24px auto 56px;
    }

    .hero {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(220, 232, 234, 0.9);
      border-radius: 36px;
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(10px);
    }

    .hero-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 26px;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--accent-dark);
      font-weight: 800;
      font-size: 1.7rem;
      letter-spacing: -0.03em;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(145deg, var(--accent-dark), var(--accent));
      position: relative;
      box-shadow: 0 10px 22px rgba(30, 169, 155, 0.25);
      flex-shrink: 0;
    }

    .brand-icon::before,
    .brand-icon::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.92);
      border-radius: 99px;
    }

    .brand-icon::before {
      width: 16px;
      height: 4px;
      top: 9px;
      left: 10px;
      transform: rotate(-35deg);
    }

    .brand-icon::after {
      width: 18px;
      height: 4px;
      bottom: 9px;
      left: 8px;
      transform: rotate(35deg);
    }

    .hero-badge,
    .result-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      background: rgba(99, 203, 193, 0.15);
      color: var(--accent-dark);
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .hero-copy {
      max-width: 900px;
      margin-bottom: 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.82rem;
      letter-spacing: 0.15em;
      font-weight: 700;
      color: var(--muted);
    }

    .hero h1 {
      margin: 0;
      max-width: 960px;
      font-size: clamp(2.2rem, 4.3vw, 4.2rem);
      line-height: 1.04;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .highlight {
      display: inline-block;
      background: linear-gradient(180deg, rgba(99,203,193,0.14), rgba(99,203,193,0.28));
      color: var(--accent-dark);
      padding: 0.04em 0.22em;
      border-radius: 14px;
    }

    .hero-text {
      margin: 18px 0 0;
      max-width: 860px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
    }

    .search-panel {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 18px;
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(220, 232, 234, 0.9);
      border-radius: 28px;
      padding: 18px;
    }

    .filter-block,
    .search-block {
      display: flex;
      flex-direction: column;
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .pill-control,
    .search-input {
      width: 100%;
      min-height: 60px;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.94);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 0 20px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .pill-control:focus,
    .search-input:focus {
      outline: none;
      border-color: rgba(99, 203, 193, 0.95);
      box-shadow: 0 0 0 5px rgba(99, 203, 193, 0.12);
    }

    .search-wrapper {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 22px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      z-index: 2;
      pointer-events: none;
      font-size: 1rem;
    }

    .search-input {
      padding-left: 54px;
    }

    .suggestions {
      list-style: none;
      margin: 12px 0 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,0.98);
      box-shadow: 0 16px 34px rgba(23, 41, 64, 0.08);
      max-height: 360px;
      overflow-y: auto;
      display: none;
    }

    .suggestions li {
      cursor: pointer;
      border-radius: 18px;
      padding: 14px 16px;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .suggestions li:hover {
      background: #f4fbfa;
      transform: translateY(-1px);
    }

    .suggestion-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
    }

    .suggestion-row .main {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .suggestion-row .main strong {
      font-size: 1rem;
      line-height: 1.3;
    }

    .suggestion-row .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .brand {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .group {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      background: #f2f8f8;
      border-radius: 999px;
      padding: 4px 10px;
      width: fit-content;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 800;
    }

    .badge-green {
      background: #e6f8ef;
      color: #177b54;
    }

    .badge-blue {
      background: #e8f2ff;
      color: #2853b2;
    }

    .result-section {
      margin-top: 24px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(220, 232, 234, 0.9);
      border-radius: 36px;
      box-shadow: var(--shadow);
      padding: 26px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 20px;
    }

    .section-title {
      margin: 0;
      font-size: clamp(1.5rem, 2vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .result:empty::before {
      content: "Search a food to see a detailed nutrition card here.";
      display: block;
      padding: 24px;
      border-radius: 24px;
      background: rgba(255,255,255,0.72);
      color: var(--muted);
      border: 1px dashed var(--line);
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(246,251,251,0.96));
      border: 1px solid rgba(220, 232, 234, 0.82);
      border-radius: 32px;
      box-shadow: 0 16px 36px rgba(26, 59, 87, 0.08);
      padding: 28px;
    }

    .card h2 {
      margin: 0 0 18px;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .meta {
      margin: 8px 0;
      color: var(--text);
      line-height: 1.65;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 22px;
      margin-bottom: 20px;
    }

    .grid div {
      background: linear-gradient(180deg, #f8fbfb, #f2f8f8);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      font-size: 0.98rem;
    }

    .small {
      color: var(--muted);
      line-height: 1.7;
      margin: 10px 0 0;
    }

    .copy-btn {
      margin-top: 22px;
      min-height: 54px;
      border: none;
      border-radius: 999px;
      padding: 0 22px;
      background: linear-gradient(180deg, var(--accent), #59c3b9);
      color: #fff;
      font-family: inherit;
      font-size: 0.98rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(99, 203, 193, 0.28);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
      box-shadow: 0 16px 28px rgba(99, 203, 193, 0.34);
    }

    @media (max-width: 960px) {
      .search-panel {
        grid-template-columns: 1fr;
      }

      .hero-topbar,
      .result-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page-shell {
        width: min(calc(100% - 24px), var(--max-width));
        margin-top: 12px;
      }

      .hero,
      .result-section,
      .card {
        padding: 18px;
        border-radius: 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .suggestion-row {
        flex-direction: column;
        gap: 10px;
      }

      .suggestion-row .meta {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div class="hero-topbar">
        <div class="brand-mark">
          <span class="brand-icon"></span>
          <span>Food Finder</span>
        </div>
        <div class="hero-badge">Nutrium-style lookup</div>
      </div>

      <div class="hero-copy">
        <p class="eyebrow">SMART FOOD SEARCH</p>
        <h1>
          Find foods and view
          <span class="highlight">nutrition details</span>
        </h1>
        <p class="hero-text">
          Search a product, browse suggestions, and copy a Nutrium-ready entry
          in a cleaner and more professional interface.
        </p>
      </div>

      <div class="search-panel">
        <div class="filter-block">
          <label for="type-filter" class="label">Category</label>
          <select id="type-filter" class="pill-control">
            <option value="all">All foods</option>
            <option value="generic">Generic only</option>
            <option value="packaged">Packaged only</option>
          </select>
        </div>

        <div class="search-block">
          <label for="food-search" class="label">Product name</label>
          <div class="search-wrapper">
            <span class="search-icon">⌕</span>
            <input
              id="food-search"
              type="text"
              class="search-input"
              placeholder="Type a food name..."
              autocomplete="off"
            />
            <ul id="suggestions" class="suggestions"></ul>
          </div>
        </div>
      </div>
    </section>

    <section class="result-section">
      <div class="result-header">
        <div>
          <p class="eyebrow">RESULT</p>
          <h2 class="section-title">Selected food</h2>
        </div>
        <div class="result-pill">Per 100 g view</div>
      </div>

      <section id="result" class="result"></section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
